<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-between overflow-hidden">
<!-- Background Decoration: Artistic Asymmetry -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-tertiary-container/30 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-8 w-full max-w-md">
<!-- Logo Cluster -->
<div class="flex flex-col items-center space-y-8">
<!-- Icon Container -->
<div class="w-32 h-32 bg-primary-container rounded-[2.5rem] flex items-center justify-center shadow-[0_20px_40px_rgba(118,90,59,0.12)]">
<span class="material-symbols-outlined text-primary text-6xl" data-icon="bento">bento</span>
</div>
<!-- Wordmark & Tagline -->
<div class="text-center space-y-3">
<h1 class="text-[2.75rem] font-extrabold text-primary tracking-tight leading-none">
                    BuddyPlan
                </h1>
<p class="text-on-surface-variant font-medium text-lg opacity-80">
                    your meal planning buddy
                </p>
</div>
</div>
<!-- Decorative Chef's Note Chip (System Signature) -->
<div class="mt-16 bg-tertiary-container text-on-tertiary-container px-5 py-2.5 rounded-full flex items-center gap-2.5 text-sm font-bold shadow-sm">
<span class="material-symbols-outlined text-lg" data-icon="auto_awesome">auto_awesome</span>
<span>Plan like a Pro</span>
</div>
</main>
<!-- Transactional Actions (Footer Anchored) -->
<footer class="relative z-10 w-full max-w-md px-8 pb-16 space-y-4">
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary-dim text-on-primary py-5 rounded-full font-bold text-lg transition-all active:scale-95 shadow-[0_12px_24px_rgba(118,90,59,0.15)] flex items-center justify-center gap-2">
            เริ่มเลย — ฟรี
        </button>
<!-- Secondary Action -->
<button class="w-full bg-surface-container-lowest border-2 border-primary/10 hover:border-primary/20 text-primary py-5 rounded-full font-bold text-lg transition-all active:scale-95 flex items-center justify-center">
            มี account แล้ว
        </button>
<!-- Tertiary/Legal Info -->
<p class="text-center text-[11px] text-on-surface-variant/60 font-semibold tracking-wider uppercase pt-4">
            Made with love for home chefs
        </p>
</footer>
<!-- Image Fallback Context (Off-screen / for engine) -->
