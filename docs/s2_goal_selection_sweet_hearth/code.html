<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Header / Top Navigation Shell suppressed per Task Focus Rule -->
<header class="flex justify-between items-center w-full px-8 py-8">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<span class="text-xl font-bold text-primary tracking-tight">BuddyPlan</span>
</div>
<div class="flex items-center gap-1">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-8 rounded-full bg-surface-container-high"></div>
</div>
</header>
<main class="flex-grow flex flex-col px-8 max-w-2xl mx-auto w-full">
<!-- Headline Section -->
<div class="mt-12 mb-16">
<h1 class="text-4xl md:text-5xl font-extrabold text-on-surface leading-[1.1] tracking-tight">
                What can <span class="text-primary">BuddyPlan</span> help you with?
            </h1>
<p class="mt-6 text-on-surface-variant text-lg leading-relaxed max-w-md">
                We'll tailor your daily artisanal meal plans based on your primary goal.
            </p>
</div>
<!-- Goal Selection Bento-ish Grid -->
<div class="grid grid-cols-1 gap-6">
<!-- Goal Card: Lose Weight -->
<button class="group relative flex items-center justify-between p-8 bg-surface-container-low rounded-xl transition-all duration-300 hover:bg-surface-container-high text-left border-4 border-transparent">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="skillet">skillet</span>
</div>
<div>
<h3 class="text-xl font-bold text-on-surface">Lose Weight</h3>
<p class="text-on-surface-variant font-medium mt-1">~1,850 kcal / day</p>
</div>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors">
<!-- Checkmark hidden -->
</div>
</button>
<!-- Goal Card: Maintain Weight (SELECTED STATE) -->
<button class="group relative flex items-center justify-between p-8 bg-surface-container-lowest rounded-xl shadow-[0px_20px_40px_rgba(49,51,47,0.05)] text-left border-4 border-primary-container ring-1 ring-primary/10">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="balance">balance</span>
</div>
<div>
<h3 class="text-xl font-bold text-on-surface">Maintain Weight</h3>
<p class="text-primary font-semibold mt-1">~2,300 kcal / day</p>
</div>
</div>
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<!-- Chef's Note Chip: Contextual UI -->
<div class="absolute -top-4 right-8 px-4 py-1.5 bg-tertiary-container rounded-full flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="text-tertiary font-bold text-xs uppercase tracking-widest">Recommended</span>
</div>
</button>
<!-- Goal Card: Gain Muscle -->
<button class="group relative flex items-center justify-between p-8 bg-surface-container-low rounded-xl transition-all duration-300 hover:bg-surface-container-high text-left border-4 border-transparent">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="fitness_center">fitness_center</span>
</div>
<div>
<h3 class="text-xl font-bold text-on-surface">Gain Muscle</h3>
<p class="text-on-surface-variant font-medium mt-1">~2,850 kcal / day</p>
</div>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors">
<!-- Checkmark hidden -->
</div>
</button>
</div>
<!-- Illustration / Decor -->
<div class="mt-12 flex justify-center opacity-40">
<div class="relative w-full max-w-xs h-32 bg-surface-container-low rounded-xl flex items-center justify-center overflow-hidden">
<div class="absolute -bottom-4 -left-4 w-24 h-24 bg-primary-container/30 rounded-full"></div>
<div class="absolute -top-8 -right-8 w-32 h-32 bg-secondary-container/20 rounded-full rotate-45"></div>
<span class="material-symbols-outlined text-primary/40 text-6xl" data-icon="restaurant">restaurant</span>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="p-8 pb-12 max-w-2xl mx-auto w-full">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary py-6 rounded-full font-bold text-xl shadow-[0px_20px_40px_rgba(49,51,47,0.1)] active:scale-95 transition-transform flex items-center justify-center gap-3">
            Next
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center mt-6 text-on-surface-variant text-sm font-medium">
            Step 2 of 5: Personalized Nutrition
        </p>
</footer>

<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-0 right-0 w-[600px] h-[600px] bg-primary-container/5 rounded-full blur-[100px] -translate-y-1/2 translate-x-1/2"></div>
